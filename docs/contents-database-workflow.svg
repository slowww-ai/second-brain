<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000" font-family="-apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Helvetica Neue', 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2D2A26" flood-opacity="0.10"/>
    </filter>
    <marker id="arrC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#D97757"/>
    </marker>
    <marker id="arrU" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5B6B83"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5E9E6F"/>
    </marker>
  </defs>
  <style>
    .h1 { font-size: 26px; font-weight: 700; fill: #2D2A26; }
    .sub { font-size: 14px; fill: #8A8378; }
    .zone { font-size: 13px; font-weight: 700; letter-spacing: 1.5px; }
    .zsub { font-size: 11px; }
    .t { font-size: 15px; font-weight: 700; fill: #2D2A26; }
    .b { font-size: 12px; fill: #5C564D; }
    .s { font-size: 11px; fill: #9A938A; }
    .mono { font-family: 'SF Mono', Menlo, monospace; }
    .pill { font-family: 'SF Mono', Menlo, monospace; font-size: 12px; font-weight: 600; fill: #FFFFFF; }
    .lblC { font-size: 11px; fill: #C0633F; font-weight: 600; }
    .lblU { font-size: 11px; fill: #5B6B83; font-weight: 600; }
    .card { fill: #FFFFFF; stroke: #E2DCD2; stroke-width: 1; }
  </style>

  <rect width="1500" height="1000" fill="#FAF9F6"/>

  <!-- Title -->
  <text x="48" y="58" class="h1">콘텐츠 데이터베이스 — 세컨드 브레인 워크플로우</text>
  <text x="48" y="84" class="sub">URL 하나가 노트가 되고, 노트가 함께 쓰는 글이 되기까지</text>

  <!-- Legend -->
  <line x1="1150" y1="42" x2="1192" y2="42" stroke="#D97757" stroke-width="2.5" marker-end="url(#arrC)"/>
  <text x="1204" y="46" class="lblC">Claude / 스킬이 자동으로 수행</text>
  <line x1="1150" y1="66" x2="1192" y2="66" stroke="#5B6B83" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrU)"/>
  <text x="1204" y="70" class="lblU">내가 직접 수행</text>
  <rect x="1150" y="80" width="56" height="18" rx="9" fill="#2D2A26"/>
  <text x="1178" y="93" class="pill" font-size="10" text-anchor="middle">/cmd</text>
  <text x="1216" y="93" class="b">슬래시 커맨드</text>

  <!-- ================= ZONE 1 : 수집 ================= -->
  <rect x="40" y="110" width="390" height="560" rx="18" fill="#EDF3FC" stroke="#C5D7EF" stroke-width="1.5"/>
  <text x="64" y="142" class="zone" fill="#4A6FA5">① 수집 (CAPTURE)</text>
  <text x="64" y="160" class="zsub" fill="#7E97BC">무엇이든 일단 던져 넣기 — 모든 것을 쌓는 것이 목표</text>

  <!-- web url -->
  <rect x="64" y="186" width="150" height="50" rx="10" class="card" filter="url(#shadow)"/>
  <text x="80" y="216" font-size="13" font-weight="600" fill="#2D2A26">🌐 웹 URL</text>
  <rect x="240" y="196" width="150" height="28" rx="14" fill="#2D2A26"/>
  <text x="315" y="214" class="pill" text-anchor="middle">/jina-capture</text>
  <text x="240" y="244" class="s">jina.ai →</text>
  <text x="240" y="260" class="s">URL을 마크다운으로 변환</text>
  <path d="M 390 210 C 440 210, 455 202, 502 200" fill="none" stroke="#D97757" stroke-width="2" marker-end="url(#arrC)"/>

  <!-- pdf / image -->
  <rect x="64" y="300" width="170" height="50" rx="10" class="card" filter="url(#shadow)"/>
  <text x="80" y="330" font-size="13" font-weight="600" fill="#2D2A26">📄 PDF · 🖼️ 이미지</text>
  <text x="64" y="372" class="s">Claude가 .md 형태로 본문 전체 옮겨 적음</text>
  <path d="M 234 325 C 380 325, 430 230, 502 220" fill="none" stroke="#5B6B83" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrU)"/>

  <!-- thought -->
  <rect x="64" y="430" width="190" height="50" rx="10" class="card" filter="url(#shadow)"/>
  <text x="80" y="460" font-size="13" font-weight="600" fill="#2D2A26">💭 생각 · 회의 메모</text>
  <text x="64" y="502" class="s">source: thought · 한국어 원문 그대로 보존</text>
  <path d="M 254 455 C 400 455, 440 280, 502 240" fill="none" stroke="#5B6B83" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrU)"/>

  <text x="64" y="600" class="b" font-style="italic" fill="#7E97BC">지금은 수집만, 정리는 나중에 —</text>
  <text x="64" y="618" class="b" font-style="italic" fill="#7E97BC">wiki/raw/에 우선 모두 정리만 함.</text>

  <!-- ================= ZONE 2 : 보관함 ================= -->
  <rect x="470" y="110" width="550" height="560" rx="18" fill="#FBF5EA" stroke="#E8D9B8" stroke-width="1.5"/>
  <text x="494" y="142" class="zone" fill="#9A7B3F">② 보관함 (THE VAULT)</text>
  <text x="494" y="160" class="zsub" fill="#B49B6C">wiki/ — Obsidian으로 열어 보는 곳</text>

  <!-- raw -->
  <rect x="510" y="180" width="470" height="100" rx="12" class="card" filter="url(#shadow)"/>
  <text x="530" y="208" class="t mono">🔒 wiki/raw/</text>
  <text x="530" y="230" class="b">추가만 가능한 수신함 — 수정·삭제 금지</text>
  <text x="530" y="248" class="s">(이후 모든 글들이 이 raw 글을 기반으로 작성되기 때문)</text>
  <text x="530" y="266" class="s">frontmatter: id · date · source · tags · status</text>

  <!-- ingest arrow -->
  <line x1="745" y1="280" x2="745" y2="336" stroke="#D97757" stroke-width="2" marker-end="url(#arrC)"/>
  <rect x="706" y="288" width="78" height="26" rx="13" fill="#2D2A26"/>
  <text x="745" y="305" class="pill" text-anchor="middle">/ingest</text>
  <text x="800" y="294" class="lblC">Claude가 새로 추가된</text>
  <text x="800" y="308" class="lblC">raw 원본을 처리</text>
  <text x="800" y="322" class="s">index.db에 저장하고</text>
  <text x="800" y="336" class="s">'처리 완료'를 트래킹 함</text>

  <!-- notes -->
  <rect x="510" y="340" width="470" height="158" rx="12" class="card" filter="url(#shadow)"/>
  <text x="530" y="370" class="t mono">🪴 wiki/notes/</text>
  <text x="530" y="392" class="b">개념들이 연결된 Wiki — 노트 하나에 개념 하나, [[위키링크]]</text>
  <line x1="905" y1="365" x2="945" y2="380" stroke="#C9C2B6" stroke-width="1.5"/>
  <line x1="945" y1="380" x2="960" y2="355" stroke="#C9C2B6" stroke-width="1.5"/>
  <line x1="905" y1="365" x2="920" y2="400" stroke="#C9C2B6" stroke-width="1.5"/>
  <line x1="945" y1="380" x2="920" y2="400" stroke="#C9C2B6" stroke-width="1.5"/>
  <circle cx="905" cy="365" r="6" fill="#D97757"/>
  <circle cx="945" cy="380" r="5" fill="#5B6B83"/>
  <circle cx="960" cy="355" r="4" fill="#9A7B3F"/>
  <circle cx="920" cy="400" r="5" fill="#5B6B83"/>
  <text x="968" y="440" class="s" text-anchor="end">매주 리뷰하며 노트간 연결고리 점검</text>
  <rect x="530" y="445" width="300" height="32" rx="16" fill="none" stroke="#5B6B83" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="548" y="465" class="lblU">✍️ 직접 노트를 추가·수정해도 됨</text>
  <rect x="852" y="448" width="84" height="26" rx="13" fill="#2D2A26"/>
  <text x="894" y="465" class="pill" text-anchor="middle">/garden</text>

  <!-- brief arrow -->
  <line x1="745" y1="498" x2="745" y2="556" stroke="#D97757" stroke-width="2" marker-end="url(#arrC)"/>
  <rect x="708" y="512" width="74" height="26" rx="13" fill="#2D2A26"/>
  <text x="745" y="529" class="pill" text-anchor="middle">/brief</text>
  <text x="800" y="522" class="lblC">노트를 모아 긴글 작성</text>
  <text x="800" y="538" class="s">md · html · docx · pdf</text>

  <!-- outputs -->
  <rect x="510" y="560" width="470" height="88" rx="12" class="card" filter="url(#shadow)"/>
  <text x="530" y="590" class="t mono">📦 wiki/outputs/</text>
  <text x="530" y="612" class="b">브리프 · 메모 · 긴 글 — [[노트]]를 기반으로 작성</text>
  <text x="530" y="632" class="s">노트의 연결관계까지 모두 취합하여 활용</text>

  <!-- ================= ZONE 3 : 색인 & 검색 ================= -->
  <rect x="40" y="700" width="980" height="262" rx="18" fill="#F2EEFA" stroke="#D4C8EC" stroke-width="1.5"/>
  <text x="64" y="732" class="zone" fill="#6B4FA8">③ 색인 &amp; 검색 (INDEX &amp; RETRIEVE)</text>
  <text x="64" y="752" class="zsub" fill="#9B86C8">노트를 자동으로 저장하고 '서치 가능하게끔' 만들어 놓는 layer</text>

  <!-- write path: notes -> reindex.py -->
  <path d="M 510 472 C 460 478, 452 520, 452 741" fill="none" stroke="#D97757" stroke-width="2" marker-end="url(#arrC)"/>
  <text transform="rotate(-90 438 600)" x="438" y="600" class="lblC" text-anchor="middle">wiki/notes/ 저장 시 자동 실행</text>

  <rect x="405" y="745" width="150" height="42" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="771" class="mono" font-size="13" font-weight="700" fill="#2D2A26" text-anchor="middle">⚙️ reindex.py</text>

  <!-- fork: reindex -> sqlite -->
  <path d="M 435 787 C 390 802, 320 800, 235 814" fill="none" stroke="#D97757" stroke-width="2" marker-end="url(#arrC)"/>
  <text x="270" y="796" class="lblC" text-anchor="middle">링크 그래프 · 장부 갱신</text>

  <!-- fork: reindex -> lancedb -->
  <path d="M 525 787 C 535 798, 542 802, 552 810" fill="none" stroke="#D97757" stroke-width="2" marker-end="url(#arrC)"/>
  <text x="568" y="798" class="lblC">바뀐 노트만</text>
  <text x="568" y="812" class="lblC">Gemini 임베딩</text>

  <!-- sqlite -->
  <rect x="70" y="818" width="290" height="135" rx="12" class="card" filter="url(#shadow)"/>
  <text x="90" y="846" class="t">🗃️ SQLite</text>
  <text x="90" y="864" class="s mono">wiki/index.db</text>
  <text x="90" y="886" class="b">원본 파일을 note로 변환하였는지</text>
  <text x="90" y="902" class="b">여부 등 status 체크</text>
  <text x="90" y="920" class="s">links — 위키링크 그래프</text>
  <text x="90" y="934" class="s">ingested — 원본 장부 (SHA-256)</text>
  <text x="90" y="948" class="s">note_meta — 수정 시각 추적</text>

  <!-- lancedb -->
  <rect x="395" y="818" width="290" height="135" rx="12" class="card" filter="url(#shadow)"/>
  <text x="415" y="846" class="t">🧠 LanceDB</text>
  <text x="415" y="864" class="s mono">wiki/lancedb/ · table notes</text>
  <text x="415" y="886" class="b">각 노트를 Gemini 임베딩 벡터를 활용하여</text>
  <text x="415" y="902" class="b">서치 가능한 VDB에 업로드</text>
  <text x="415" y="922" class="s">note를 만들 때, 또는 /ask 명령어가 들어오거나,</text>
  <text x="415" y="936" class="s">긴 아티클을 위한 추가 정보가 필요할 때 서치를 함</text>

  <!-- ask -->
  <rect x="800" y="818" width="180" height="135" rx="12" class="card" filter="url(#shadow)"/>
  <rect x="820" y="834" width="64" height="26" rx="13" fill="#2D2A26"/>
  <text x="852" y="851" class="pill" text-anchor="middle">/ask</text>
  <text x="820" y="886" class="b">채팅으로 답변,</text>
  <text x="820" y="904" class="b">[[위키링크]] 인용</text>

  <!-- read path: ask <-> lancedb -->
  <path d="M 860 814 C 830 768, 740 768, 681 812" fill="none" stroke="#D97757" stroke-width="2" marker-end="url(#arrC)"/>
  <text x="778" y="764" class="lblC" text-anchor="middle">질문을 임베딩 → 벡터 검색</text>
  <line x1="689" y1="880" x2="794" y2="880" stroke="#D97757" stroke-width="2" marker-end="url(#arrC)"/>
  <text x="741" y="898" class="lblC" text-anchor="middle">관련 노트 반환</text>

  <!-- ================= ZONE 4 : Claude와 함께 쓰기 ================= -->
  <rect x="1060" y="110" width="400" height="850" rx="18" fill="#FCEFF2" stroke="#F0CBD5" stroke-width="1.5"/>
  <text x="1084" y="142" class="zone" fill="#B4506B">④ Claude와 함께 쓰기 (CO-WRITE)</text>
  <text x="1084" y="160" class="zsub" fill="#CC8295">긴 글을 함께 다듬기 — /cowrite</text>

  <!-- outputs -> canvas -->
  <path d="M 980 600 C 1040 595, 1035 320, 1092 278" fill="none" stroke="#5B6B83" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrU)"/>
  <text transform="rotate(-80 1014 500)" x="1014" y="500" class="lblU">초안을 cowrite로 열기</text>

  <!-- browser canvas mockup -->
  <rect x="1096" y="190" width="328" height="180" rx="12" class="card" filter="url(#shadow)"/>
  <rect x="1097" y="191" width="326" height="28" rx="11" fill="#F1EDE6"/>
  <rect x="1097" y="206" width="326" height="13" fill="#F1EDE6"/>
  <circle cx="1114" cy="205" r="4" fill="#FF5F57"/>
  <circle cx="1128" cy="205" r="4" fill="#FEBC2E"/>
  <circle cx="1142" cy="205" r="4" fill="#28C840"/>
  <text x="1160" y="209" class="s mono">cowrite.html — 챕터 캔버스</text>
  <rect x="1112" y="236" width="70" height="8" rx="4" fill="#D97757" opacity="0.5"/>
  <rect x="1112" y="252" width="60" height="8" rx="4" fill="#E3DDD2"/>
  <rect x="1112" y="268" width="66" height="8" rx="4" fill="#E3DDD2"/>
  <rect x="1112" y="284" width="54" height="8" rx="4" fill="#E3DDD2"/>
  <rect x="1112" y="300" width="62" height="8" rx="4" fill="#E3DDD2"/>
  <rect x="1196" y="236" width="210" height="7" rx="3.5" fill="#ECE7DD"/>
  <rect x="1196" y="250" width="198" height="7" rx="3.5" fill="#ECE7DD"/>
  <rect x="1196" y="264" width="206" height="7" rx="3.5" fill="#ECE7DD"/>
  <rect x="1196" y="278" width="160" height="7" rx="3.5" fill="#ECE7DD"/>
  <rect x="1196" y="300" width="204" height="7" rx="3.5" fill="#ECE7DD"/>
  <rect x="1196" y="314" width="188" height="7" rx="3.5" fill="#ECE7DD"/>
  <rect x="1196" y="328" width="120" height="7" rx="3.5" fill="#ECE7DD"/>
  <text x="1112" y="356" class="s" font-size="10">브라우저 기반 글 수정 플랫폼</text>

  <!-- canvas -> you -->
  <line x1="1200" y1="370" x2="1200" y2="426" stroke="#5B6B83" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrU)"/>
  <text x="1212" y="402" class="lblU">내가 고치고 저장</text>

  <!-- you card -->
  <rect x="1096" y="430" width="328" height="86" rx="12" class="card" filter="url(#shadow)"/>
  <rect x="1096" y="430" width="6" height="86" rx="3" fill="#5B6B83"/>
  <text x="1118" y="460" class="t">🧑 나</text>
  <text x="1118" y="482" class="b">챕터 수정 · 톤 다듬기 · 저장</text>
  <text x="1118" y="502" class="s">저장하면 원본 .md에 바로 기록</text>

  <!-- you -> claude -->
  <line x1="1200" y1="516" x2="1200" y2="576" stroke="#D97757" stroke-width="2" marker-end="url(#arrC)"/>
  <text x="1212" y="550" class="lblC">Claude가 내 수정을 읽음</text>

  <!-- claude card -->
  <rect x="1096" y="580" width="328" height="86" rx="12" class="card" filter="url(#shadow)"/>
  <rect x="1096" y="580" width="6" height="86" rx="3" fill="#D97757"/>
  <text x="1118" y="610" class="t">✱ Claude</text>
  <text x="1118" y="632" class="b">챕터를 리뷰하고 내가 지시한 대로 추가 수정</text>
  <text x="1118" y="652" class="s">자주 참고하는 레퍼런스도 함께 조회</text>

  <!-- claude -> canvas loop back -->
  <path d="M 1424 615 C 1452 540, 1452 350, 1424 290" fill="none" stroke="#D97757" stroke-width="2" marker-end="url(#arrC)"/>
  <text transform="rotate(-90 1448 520)" x="1448" y="524" class="lblC" text-anchor="middle">고친 내용이 캔버스에 나타남</text>

  <!-- done -->
  <line x1="1200" y1="666" x2="1200" y2="706" stroke="#5E9E6F" stroke-width="2" marker-end="url(#arrG)"/>
  <rect x="1096" y="710" width="328" height="54" rx="27" fill="#E7F3E9" stroke="#8FBF9A" stroke-width="1.5"/>
  <text x="1260" y="742" font-size="13" font-weight="700" fill="#3E7A4E" text-anchor="middle">✅ 다듬어진 글 — wiki/outputs/에 완성</text>

  <!-- spin-offs -->
  <text x="1096" y="812" class="zone" font-size="11" fill="#B4506B">그다음 파생하기</text>
  <rect x="1096" y="826" width="110" height="26" rx="13" fill="#2D2A26"/>
  <text x="1151" y="843" class="pill" text-anchor="middle">/shortwrite</text>
  <text x="1220" y="843" class="b">하나의 관점만 뽑은 짧은 SNS 글</text>
  <rect x="1096" y="866" width="110" height="26" rx="13" fill="#2D2A26"/>
  <text x="1151" y="883" class="pill" text-anchor="middle">/slowai</text>
  <text x="1220" y="883" class="b">SlowAI 블로그 한국어 초안</text>

  <!-- footer -->
  <text x="48" y="984" class="s">contents_database · 세컨드 브레인 워크플로우 · 2026-06-11</text>
</svg>
